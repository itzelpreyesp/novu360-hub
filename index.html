<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Novu 360 · Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#00c2a8",
                        "on-primary": "#00382f",
                        "primary": "#42dec3",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#c6c6c6",
                        "secondary-container": "#474747",
                        "on-surface-variant": "#bbcac4",
                        "surface": "#0e1513",
                        "on-primary-fixed": "#00201b",
                        "on-primary-container": "#00493e",
                        "surface-tint": "#41ddc2",
                        "on-tertiary-fixed": "#3a0b00",
                        "background": "#0e1513",
                        "on-tertiary": "#5e1700",
                        "surface-bright": "#333b38",
                        "surface-container-high": "#242b29",
                        "tertiary-container": "#ff8d69",
                        "on-background": "#dde4e1",
                        "on-error": "#690005",
                        "tertiary": "#ffb6a0",
                        "inverse-surface": "#dde4e1",
                        "error": "#ffb4ab",
                        "surface-dim": "#0e1513",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#41ddc2",
                        "primary-fixed": "#65fade",
                        "on-surface": "#dde4e1",
                        "on-tertiary-container": "#752509",
                        "tertiary-fixed-dim": "#ffb59e",
                        "outline": "#85948f",
                        "secondary-fixed": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#7e2c0f",
                        "surface-container-highest": "#2f3634",
                        "surface-container-lowest": "#09100e",
                        "surface-container-low": "#161d1b",
                        "surface-container": "#1a211f",
                        "on-secondary-fixed-variant": "#474747",
                        "outline-variant": "#3c4a46",
                        "on-secondary-container": "#b5b5b5",
                        "tertiary-fixed": "#ffdbd0",
                        "on-primary-fixed-variant": "#005045",
                        "on-secondary-fixed": "#1b1b1b",
                        "inverse-on-surface": "#2b3230",
                        "on-secondary": "#303030",
                        "inverse-primary": "#006b5c",
                        "surface-variant": "#2f3634",
                        "secondary": "#c6c6c6"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = '';
  const SUPABASE_ANON_KEY = '';
  const GEMINI_KEY = '';
  
  // Iniciar Supabase Globals
  if (window.supabase) {
    window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.CONFIG = { SUPABASE_URL, SUPABASE_ANON_KEY, GEMINI_KEY };
  }
</script>
</head>
<body class="font-body text-on-background min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-md">
<!-- Brand Identity Section -->
<div class="text-center mb-8">
<h1 class="font-headline font-black text-4xl tracking-tight text-primary-container mb-2">Novu 360</h1>
<p class="font-body text-on-surface-variant font-medium tracking-wide uppercase text-xs">Sistema Operativo de Agencia</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-8 shadow-2xl">
<form  class="space-y-6" id="login-form" >
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface" for="email">Correo electrónico</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary-container transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-high border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary-container focus:border-primary-container text-on-surface placeholder:text-on-surface-variant/50 transition-all outline-none" id="email" name="email" placeholder="nombre@novu360.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label text-sm font-medium text-on-surface" for="password">Contraseña</label>
<a class="text-xs font-medium text-primary hover:text-primary-container transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary-container transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-high border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary-container focus:border-primary-container text-on-surface placeholder:text-on-surface-variant/50 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline font-bold py-3.5 px-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex justify-center items-center gap-2 group" type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-on-surface-variant uppercase tracking-widest">o continúa con</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Google OAuth -->
<button class="w-full bg-white text-zinc-900 font-body font-semibold py-3 px-4 rounded-lg hover:bg-zinc-100 active:scale-[0.98] transition-all flex justify-center items-center gap-3 border border-zinc-200" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continuar con Google
                </button>
</form>
</div>
<!-- Security Footer -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 bg-surface-container-high/50 px-4 py-2 rounded-full border border-outline-variant/30">
<span class="material-symbols-outlined text-[16px] text-primary">verified_user</span>
<span class="text-[11px] font-medium text-on-surface-variant uppercase tracking-wider">Solo para miembros del equipo Novu 360</span>
</div>
<div class="flex gap-6 text-[11px] font-medium text-on-surface-variant/60 uppercase tracking-widest">
<a class="hover:text-primary-container transition-colors" href="#">Seguridad</a>
<a class="hover:text-primary-container transition-colors" href="#">Privacidad</a>
<a class="hover:text-primary-container transition-colors" href="#">Soporte</a>
</div>
</div>
</main>
<!-- Background Decorative Element (Asymmetric) -->
<div class="fixed top-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -mr-64 -mt-64 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] -ml-48 -mb-48 pointer-events-none"></div>
<script src="auth.js" defer></script>
</body></html>
