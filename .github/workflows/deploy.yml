name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create config.js from Secrets 🔑
        run: |
          cat <<EOF > config.js
          const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          const SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          const GEMINI_API_URL = '${{ secrets.GEMINI_API_URL }}';

          window.CONFIG = { SUPABASE_URL, SUPABASE_ANON_KEY, GEMINI_API_URL };

          document.addEventListener('DOMContentLoaded', function() {
            if (window.supabase) {
              window.supabaseClient = window.supabase.createClient(
                SUPABASE_URL, 
                SUPABASE_ANON_KEY
              );
            }
          });
          EOF

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
