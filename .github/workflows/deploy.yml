name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create config.js from API base
        run: |
          cat <<EOF > config.js
          const API_BASE_URL = '${{ secrets.API_BASE_URL }}';

          window.CONFIG = { API_BASE_URL };

          if (typeof window.createNovuSupabaseClient === 'function') {
            window.supabaseClient = window.createNovuSupabaseClient(API_BASE_URL || '/api');
          }
          EOF

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
