name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create config.js from Secrets 🔑
        run: |
          cat <<EOF > config.js
          const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          const SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          const GEMINI_KEY = '${{ secrets.GEMINI_KEY }}';

          // Initialize Supabase Globals
          if (window.supabase) {
            window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            window.CONFIG = { SUPABASE_URL, SUPABASE_ANON_KEY, GEMINI_KEY };
          }
          
          // Export for use in other scripts (optional)
          if (typeof module !== 'undefined' && module.exports) {
              module.exports = { SUPABASE_URL, SUPABASE_ANON_KEY, GEMINI_KEY, supabaseClient: window.supabaseClient };
          }
          EOF

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
